<!DOCTYPE html>
<html>

<head>

<title>Members</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="panel">

<h2>Member Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<br>

<button class="goldButton" onclick="login()">

Login

</button>

</div>

<div id="adminPanel" style="display:none">

<div class="panel">

<h3>Create User</h3>

<input id="newUser" placeholder="Username">

<input id="newPass" placeholder="Password">

<select id="role">

<option value="member">Member</option>

<option value="pastor">Pastor / Event Coordinator</option>

<option value="admin">Admin</option>

</select>

<br>

<button class="goldButton" onclick="createUser()">

Create User

</button>

</div>

<div class="calendarPanel">

<h3>Pending Event Requests</h3>

<table id="requestsTable">

<tr>
<th>Date</th>
<th>Event</th>
<th>Approve</th>
</tr>

</table>

</div>

</div>

<script>

function login(){

let users = JSON.parse(localStorage.getItem("users")||"[]")

let u = users.find(x=>x.username==username.value && x.password==password.value)

if(u && u.role=="admin"){

adminPanel.style.display="block"

loadRequests()

}else{

alert("Access denied")

}

}

function createUser(){

let users = JSON.parse(localStorage.getItem("users")||"[]")

users.push({

username:newUser.value,
password:newPass.value,
role:role.value

})

localStorage.setItem("users",JSON.stringify(users))

alert("User created")

}

function loadRequests(){

let requests = JSON.parse(localStorage.getItem("eventRequests")||"[]")

requests.forEach((r,i)=>{

let row = requestsTable.insertRow()

row.insertCell(0).innerText=r.date

row.insertCell(1).innerText=r.event

let btn=document.createElement("button")

btn.innerText="Approve"

btn.className="goldButton"

btn.onclick=function(){approve(i)}

row.insertCell(2).appendChild(btn)

})

}

function approve(i){

let requests = JSON.parse(localStorage.getItem("eventRequests")||"[]")

let events = JSON.parse(localStorage.getItem("approvedEvents")||"[]")

events.push(requests[i])

requests.splice(i,1)

localStorage.setItem("approvedEvents",JSON.stringify(events))

localStorage.setItem("eventRequests",JSON.stringify(requests))

alert("Event Approved")

}

</script>

</body>

</html>
